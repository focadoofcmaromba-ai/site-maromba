<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Carrinho | DYXON MAROMBA</title>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="produto.css">

</head>

<body>

    <div id="navbar-container"></div>

    <section class="produto-banner">

        <div class="container">

            <h1>

                <i class="fas fa-cart-shopping"></i>

                Meu Carrinho

            </h1>

        </div>

    </section>

    <section class="container pagina-carrinho">

        <div class="carrinho-layout">

            <!-- PRODUTOS -->

            <div class="carrinho-produtos">

                <div id="listaCarrinho"></div>

            </div>

            <!-- RESUMO -->

            <aside class="carrinho-resumo">

                <div class="compra-card">

                    <div class="campo-compra">

                        <label for="cep">

                            <i class="fas fa-location-dot"></i>

                            CEP

                        </label>

                        <input
                            type="text"
                            id="cep"
                            maxlength="9"
                            placeholder="00000-000">

                        <p id="avisoCep" class="aviso-cep"></p>

                    </div>

                    <div id="resumoCarrinho">

                        <div class="resumo-compra">

                            <div class="linha-resumo">

                                <span>

                                    <i class="fas fa-receipt"></i>

                                    Subtotal

                                </span>

                                <strong id="subtotal">

                                    R$ 0,00

                                </strong>

                            </div>

                            <div class="linha-resumo">

                                <span>

                                    <i class="fas fa-truck"></i>

                                    Frete

                                </span>

                                <strong id="frete">

                                    Informe o CEP

                                </strong>

                            </div>

                            <div class="linha-resumo total">

                                <span>

                                    <i class="fas fa-wallet"></i>

                                    Total

                                </span>

                                <strong id="total">

                                    R$ 0,00

                                </strong>

                            </div>

                        </div>

                    </div>

                    <button
                        id="btnFinalizar"
                        class="btn btn-primary btn-finalizar">

                        Finalizar Pedido

                    </button>

                </div>

            </aside>

        </div>

    </section>

    <div id="footer-container"></div>

    <script src="carrinho.js"></script>

    <script src="js/notifications.js"></script>

</body>

</html>
