<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DYXON MAROMBA - YouTube</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; margin: 0; padding: 0; }
    .card-hover { transition: all 0.3s; }
    .card-hover:hover { transform: translateY(-8px); box-shadow: 0 0 25px rgba(239, 68, 68, 0.4); }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body class="bg-[#0a0a0a] text-white">

  <!-- MENU CENTRALIZADO -->
  <div id="navbar-container"></div>

  <section class="page-hero">

    <div class="hero-content">

        <div class="hero-badge">
            ▶ CONTEÚDO MAROMBA
        </div>

        <h1>
            Melhores Canais de
            <span class="highlight">Musculação</span>
        </h1>

        <p>
            Conteúdos selecionados com treinos, dicas, atletas, campeonatos,
            motivação e as principais novidades do mundo maromba.
        </p>

    </div>

</section>

<section class="max-w-7xl mx-auto px-6 pt-10 pb-20">

    <div id="preview" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

</section>

<div id="footer-container"></div>

  </div>

  <script>
    const canais = [
      {"name":"LEO STRONDA","id":"UC6gJAnIhDn2Fy_jZfICmgSA"},
      {"name":"Renato Cariani","id":"UCPX0gLduKAfgr-HJENa7CFw"},
      {"name":"Growth TV","id":"UCGfrC6R2PSMeXv4hdhONB6Q"},
      {"name":"Escola Maromba","id":"UCbzPEdQRN97S-VvDGXWwh4Q"},
      {"name":"Leandro Twin","id":"UCPlemwX82_QEWRDC6yYnOCg"},
      {"name":"Paulo Muzy","id":"UCUOsr03iLj627hJm55cmIPw"}
    ];

    // Carrega o navbar inteligente (menu único pra todo site)
    fetch('navbar.html')
  .then(res => res.text())
  .then(html => {

      const container = document.getElementById('navbar-container');

      if (!container.innerHTML.trim()) {

          container.innerHTML = html;

          const script = container.querySelector('script');

          if (script) {

              const novoScript = document.createElement('script');

              novoScript.textContent = script.textContent;

              document.body.appendChild(novoScript);

              script.remove();

          }

      }

  })
  .catch(err => console.error('Erro ao carregar navbar:', err));

    async function carregarVideos() {
      const preview = document.getElementById("preview");
      preview.innerHTML = "";
      
      for (let canal of canais) {
        try {
          const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=${canal.id}`);
          const data = await res.json();
          if (data.items && data.items.length > 0) {
            const video = data.items[0];
            const card = document.createElement("div");
            card.className = "bg-zinc-900 border border-red-900 rounded-2xl overflow-hidden card-hover";
            card.innerHTML = `
              <img src="${video.thumbnail}" class="w-full h-48 object-cover">
              <div class="p-5">
                <div class="text-red-400 text-sm mb-2">${canal.name}</div>
                <h3 class="font-bold text-lg leading-tight line-clamp-2">${video.title}</h3>
                <a href="${video.link}" target="_blank" 
                   class="mt-4 inline-flex items-center gap-2 bg-red-600 hover:bg-red-500 text-white px-5 py-2.5 rounded-full text-sm font-semibold">
                  Ver no YouTube →
                </a>
              </div>
            `;
            preview.appendChild(card);
          }
        } catch(e){}
      }
    }
    
    window.onload = carregarVideos;
</script>

<script>
fetch("footer.html")
  .then(res => res.text())
  .then(html => {

      const container = document.getElementById("footer-container");

      if (container) {
          container.innerHTML = html;
      }

  })
  .catch(err => console.error("Erro ao carregar footer:", err));
</script>

     class="fixed bottom-6 right-6 w-16 h-16 bg-green-500 hover:bg-green-400 transition-all duration-300 rounded-full flex items-center justify-center shadow-2xl shadow-green-500/50 cursor-pointer z-50">

    <i class="fa-brands fa-whatsapp text-white text-4xl"></i>

</div>

<script src="js/notifications.js"></script>

</body>
</html>
